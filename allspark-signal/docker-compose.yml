services:
  challenge:
    build: .
    image: tf-allspark-signal
    read_only: true
    tmpfs:
      - /tmp:size=10m,mode=1777
      - /var/run:size=1m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "1001:1001"
    ports:
      - "3000:3000"
    networks:
      - challenge-net

networks:
  challenge-net:
    driver: bridge
    # Egress intentionally allowed — players can get reverse shells
    # but cannot install tools or escalate privileges
